<!doctype html>
<html lang="en-AU">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>429 | Too many requests</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="error-page" aria-labelledby="page-title">
    <section class="card">
      <header class="brand-bar">
        <div class="brand" aria-label="Fibre Fox Communications">
        </div>
        <span class="status-pill">HTTP 429</span>
      </header>
      <div class="content">
        <div class="error-code" aria-hidden="true">429</div>
        <h1 id="page-title">Too many requests</h1>
        <p>This service has received too many requests in a short period. Please try again shortly.</p>
        </div>
    </section>
  </main>
</body>
</html>
