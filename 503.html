  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>503 | Service unavailable</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

    <section class="card">
      <header class="brand-bar">
        <div class="brand" aria-label="Fibre Fox Communications">

        <span class="status-pill">HTTP 503</span>

      <div class="content">

        <h1 id="page-title">Service unavailable</h1>
        <p>This service is temporarily unavailable due to maintenance or capacity limits.</p>
      </div>
    </section>
  </main>
