<!doctype html>
<html lang="en-AU">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>504 | Gateway timeout</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="error-page" aria-labelledby="page-title">
    <section class="card">
      <header class="brand-bar">
        <div class="brand" aria-label="Fibre Fox Communications">
          </div>
        <span class="status-pill">HTTP 504</span>
      </header>
      <div class="content">
        <div class="error-code" aria-hidden="true">504</div>
        <h1 id="page-title">Gateway timeout</h1>
        <p>The upstream service did not respond in time. Please try again shortly.</p>
      </div>
    </section>
  </main>
</body>
</html>
