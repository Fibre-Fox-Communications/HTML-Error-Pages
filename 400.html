<!doctype html>
<html lang="en-AU">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>400 | Bad request</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="error-page" aria-labelledby="page-title">
    <section class="card">
      <header class="brand-bar">
        <div class="brand" aria-label="Fibre Fox Communications">
        </div>
        <span class="status-pill">HTTP 400</span>
      </header>
      <div class="content">
        <div class="error-code" aria-hidden="true">400</div>
        <h1 id="page-title">Bad request</h1>
        <p>The request could not be understood by the server. Please check the address and try again.</p>
        
      </div>
    </section>
  </main>
</body>
</html>
